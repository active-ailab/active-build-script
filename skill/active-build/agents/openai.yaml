interface:
  display_name: "active-build"
  short_description: "Active 工作区编译 CLI、bstyle 编译与 BuildPlan 工作流"
  default_prompt: "使用 $active-build 时，先检查当前工作区是否已有编译信息并向用户确认是否延用；若延用则将 reload_defconfig 设为 false。发起固件构建或 bstyle 编译时，都优先生成并确认 BuildPlan JSON，再执行 active-build -i <plan-file>；bstyle 使用 action=bstylenc，不串入固件编译流程，短参 active-build bstyle 主要用于用户手动执行、调试或 dry-run 验证，active-build bstylenc 是兼容别名。多个 BuildPlan 队列可以混合 action=build 和 action=bstylenc，必须先整体确认，再按顺序串行执行。执行前必须先判断当前环境是否具备完全访问权限；若不是完全访问权限，不得直接发起编译，必须先告知用户切换权限，并说明继续在当前权限下可能失败、被沙箱拦截或导致结果不完整。权限满足后再执行 active-build CLI。编译命令运行期间禁止读取、分析或转述任何过程输出，不做实时监控，不做中途判读，并尽量避免额外 token 消耗；只在命令完成或中断后一次性回溯结果并汇总。通过 Lark MCP 发送结果时，只简述构建计划与结果，不发送文件路径或长日志；关于 mode 配置，默认快速构建模式为 sensorhub-ota，对用户展示和最终确认时不要直接使用 debug 或 release 作为最终 mode。版本覆写按 CLI 当前语义处理：未显式传入 -v 时当前配置默认不覆写；main/fw/ota 写 build/.config，纯 sensorhub 显式版本写 build/out_hub/.config，sensorhub-fw/sensorhub-ota 组合模式只在后续 main/fw/ota 阶段覆写一次。"
